apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: esprit-market

resources:
  - ../../

images:
  - name: thesphynx2000/espritmarket-backend
    newTag: latest
  - name: thesphynx2000/espritmarket-frontend
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: esprit-market-backend
      patch: |-
        - op: replace
          path: /spec/replicas
          value: 1
        - op: replace
          path: /spec/template/spec/affinity
          value: null

  - target:
      kind: Deployment
      name: esprit-market-frontend
      patch: |-
        - op: replace
          path: /spec/replicas
          value: 1
        - op: replace
          path: /spec/template/spec/affinity
          value: null
