apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: esprit-market
  annotations:
    kubernetes.io/description: "Application secrets - replace with external-secrets or sealed-secrets in production"
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD}"
  JWT_SECRET: "${JWT_SECRET}"
  GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY}"
