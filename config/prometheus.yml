global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'esprit-market-backend'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8088']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'esprit-market-backend'
